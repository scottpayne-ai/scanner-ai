filtering:
  min_duration_seconds: 10
  poll_interval_seconds: 30
  lookback_minutes: 5

transcription:
  model_size: "base"
  language: "en"
  initial_prompt: >-
    North Texas public safety radio dispatch. NTIRN system.
    Agencies: Grapevine Police, Grapevine Fire, Euless Police, Euless Fire,
    Colleyville Police, Southlake Police, Keller Police, Westlake Police.
    Common streets: Ira E Woods Ave, Glade Rd, Euless Main St, Airport Freeway,
    SH 121, SH 114, DFW Airport, Grapevine Mills, Bass Pro Dr, William D Tate Ave.
    Common terms: Code 4, Signal 4, en route, on scene, clear, 10-4,
    structure fire, working fire, MVA, domestic disturbance, welfare check,
    shots fired, signal 5, BOLO, EMS requested.
  beam_size: 5
  no_speech_threshold: 0.75
  normalization: 95
  block_phrases:
    - "CastingWords"
    - "Rev.com"
    - "amara.org"
    - "Thank you for watching"
    - "Stay tuned"
    - "We'll be right back"
    - "Transcription Outsourcing"
  output_folder: "transcripts/"

alerting:
  enabled: true
  min_duration_for_alert: 15
  high_priority_keywords:
    - "structure fire"
    - "working fire"
    - "shots fired"
    - "shooting"
    - "stabbing"
    - "hostage"
    - "officer down"
    - "multiple callers"
    - "explosion"
    - "mayday"
    - "mass casualty"
  medium_priority_keywords:
    - "major accident"
    - "MVA"
    - "extrication"
    - "pursuit"
    - "chase"
    - "armed"
    - "weapon"
    - "signal 5"
    - "domestic"
    - "welfare check"
    - "rollover"
    - "unconscious"
    - "cardiac arrest"
  location_keywords:
    - "Ira E Woods"
    - "Glade Road"
    - "Grapevine Mills"
    - "DFW Airport"
    - "Northwest Highway"
    - "William D Tate"
    - "Bass Pro"
    - "Euless Main"
    - "Airport Freeway"
    - "121"
    - "114"
  notifications:
    email:
      enabled: false

openai:
  api_key: ""
  model: "gpt-4o-mini"
  summarize: false

logging:
  log_file: "scanner_log.jsonl"
  print_all_calls: true
